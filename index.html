<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Electricity Monitor</title>
<link rel="stylesheet" href="style.css"/>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</head>

<body>
<div class="container">
    <div class="header">
        <h1>⚡Your-Elec </h1>
        <p>Real-Time Voltage, Current, Power and Energy Monitoring</p>
        <button id="refresh-btn" class="refresh-btn">🔄 Refresh Data</button>
        <p id="last-updated" class="last-updated">Last updated: Loading...</p>
    </div>


    <!-- LIVE MONITOR -->
    <div class="live-monitor">
        <h2 id = "live-monitor-title">📡 Live Sensor Monitor</h2>
        <div class="live-grid">
            <div class="live-card"><h3>⚡ Voltage</h3><p id="live-voltage" class="loading">Loading...</p></div>
            <div class="live-card"><h3>🔌 Current</h3><p id="live-current" class="loading">Loading...</p></div>
            <div class="live-card"><h3>💡 Power</h3><p id="live-power" class="loading">Loading...</p></div>
            <div class="live-card"><h3>📊 Total Units</h3><p id="live-units" class="loading">Loading...</p></div>
        </div>
    </div>

    <!-- BILL CALCULATOR -->
    <div class="bill-calculator">
        <h2 id="bill-title">💰 Electricity Bill Calculator</h2>
        <div class="bill-inputs">
            <div class="input-group">
                <label for="rate-input">Rate per unit (₹):</label>
                <input type="number" id="rate-input" value="8.50" step="0.01" min="0">
            </div>
            <button id="calculate-bill-btn" class="calculate-btn">🧮 Calculate Bill</button>
        </div>
        <div class="bill-result">
            <div class="bill-card">
                <h3>💵 Current Bill Amount</h3>
                <p id="bill-amount" class="bill-amount">₹0.00</p>
            </div>
        </div>
    </div>

    <!-- GRAPH -->
    <div class="graph-section">
        <h2 id = "graph-title">📊 Live Power Usage</h2>
        <canvas id="powerChart"></canvas>
    </div>

</div>
</body>
</html>
