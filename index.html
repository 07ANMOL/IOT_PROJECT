
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Electricity Monitor</title>

<link rel="stylesheet" href="style.css"/>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="theme-toggle" onclick="toggleTheme()">🌙</div>
        <h1>⚡ Your-Elec</h1>
        <p>Real-Time Voltage, Current, Power & Energy Monitoring</p>
        <button id="refresh-btn" class="refresh-btn">🔄 Refresh Data</button>
        <p id="status">🟢 Live Updating...</p>
        <p id="last-updated">Last updated: Loading...</p>
    </div>

    <!-- LIVE DATA -->
    <div class="live-monitor">
        <h2>📡 Live Sensor Monitor</h2>

        <div class="live-grid">
            <div class="live-card"><h3>⚡ Voltage</h3><p id="live-voltage" class="loading">--</p></div>
            <div class="live-card"><h3>🔌 Current</h3><p id="live-current" class="loading">--</p></div>
            <div class="live-card"><h3>💡 Power</h3><p id="live-power" class="loading">--</p></div>
            <div class="live-card"><h3>📊 Units</h3><p id="live-units" class="loading">--</p></div>
        </div>
    </div>

    <!-- BILL -->
    <div class="bill-calculator">
        <h2>💰 Electricity Bill Calculator</h2>

        <div class="bill-inputs">
            <div class="charge-input-group">
                <label>Enter per unit charge:</label>
                <button id="decrease-charge-btn" class="charge-btn">−</button>
                <input type="number" id="per-unit-charge" value="0" readonly>
                <button id="increase-charge-btn" class="charge-btn">+</button>
            </div>
            <button id="calculate-bill-btn">🧮 Calculate</button>
        </div>

        <div class="bill-card">
            <h3>💵 Bill Amount</h3>
            <p id="bill-amount">₹0.00</p>
        </div>
    </div>

    <!-- GRAPH -->
    <div class="graph-section">
        <h2>📊 Live Power Usage</h2>
        <canvas id="powerChart"></canvas>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
